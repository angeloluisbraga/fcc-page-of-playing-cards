<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page of Playing Cards</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main id="playing-cards">
    
    <!-- Card 1: Ace of Spades -->
    <div class="card rank-a spades">
      <div class="left">
        <span>A</span>
        <span>♠</span>
      </div>
      <div class="middle">
        <span>♠</span>
      </div>
      <div class="right">
        <span>A</span>
        <span>♠</span>
      </div>
    </div>

    <!-- Card 2: King of Hearts -->
    <div class="card rank-k hearts">
      <div class="left">
        <span>K</span>
        <span>♥</span>
      </div>
      <div class="middle">
        <span>♥</span>
        <span>👑</span>
        <span>♥</span>
      </div>
      <div class="right">
        <span>K</span>
        <span>♥</span>
      </div>
    </div>

    <!-- Card 3: Ten of Diamonds -->
    <div class="card rank-10 diamonds">
      <div class="left">
        <span>10</span>
        <span>♦</span>
      </div>
      <div class="middle">
        <span>♦</span>
        <span>♦</span>
        <span>♦</span>
      </div>
      <div class="right">
        <span>10</span>
        <span>♦</span>
      </div>
    </div>

  </main>

</body>
</html>
